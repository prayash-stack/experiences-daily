name: Refresh news

on:
  schedule:
    # 02:15 UTC = 07:45 IST. GitHub cron often lags 10–20 min at peak,
    # so this lands around 8:00 AM IST.
    - cron: '15 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  models: read # free GitHub Models inference for the AI digest

concurrency:
  group: refresh-news
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # continue-on-error so a partially-failed fetch (script exits 1 when
      # half the feeds are unhealthy, AFTER writing what it got) still commits;
      # the gate step below then marks the run red so the failure is visible.
      - name: Fetch news
        id: fetch
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: add ANTHROPIC_API_KEY as a repo secret to upgrade the
          # AI digest from GitHub Models (free) to the Claude API.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node fetch-news.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/news.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh news ($(date -u +%Y-%m-%d))"
            for i in 1 2 3; do
              git push && exit 0
              git pull --rebase origin main
            done
            git push
          fi

      - name: Fail the run if the fetch was unhealthy
        if: steps.fetch.outcome == 'failure'
        run: exit 1
